name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Java (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 simulator/ spark/ great_expectations/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 simulator/ spark/ great_expectations/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --junitxml=reports/junit.xml
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: fraud_db
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: test_password

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml

  dbt-compile:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fraud_db
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
            pip install dbt-core==1.7.0 dbt-postgres==1.7.0 "protobuf>=3.20,<5.0"

      - name: Initialize database schema
        run: |
          PGPASSWORD=test_password psql -h localhost -U fraud_user -d fraud_db -f postgres/init.sql

      - name: Compile dbt models
        working-directory: dbt
        run: |
          dbt deps
          dbt compile
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: fraud_db
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: test_password

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build Docker images
        run: docker compose build --no-cache
