fraud_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB', 'fraud_db') }}"
      user: "{{ env_var('POSTGRES_USER', 'fraud_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'fraud_pass') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
