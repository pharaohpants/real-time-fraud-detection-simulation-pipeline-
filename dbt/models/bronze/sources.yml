version: 2

sources:
  - name: fraud_db
    description: Raw data from fraud detection pipeline
    database: "{{ env_var('POSTGRES_DB') }}"
    schema: public
    tables:
      - name: raw_transactions
        description: Raw transaction data from Kafka/Spark
        columns:
          - name: transaction_id
            description: Unique transaction identifier
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Customer identifier
          - name: amount
            description: Transaction amount in Rp
      
      - name: fraud_flags
        description: Fraud detection results
        columns:
          - name: transaction_id
            description: Unique transaction identifier
          - name: risk_score
            description: Fraud risk score (0-200)
          - name: decision
            description: Fraud decision (APPROVE, REVIEW, BLOCK)
